<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Once Human Mods Encyclopedia</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
input { margin-bottom: 10px; padding: 5px; width: 300px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 5px; text-align: left; }
</style>
</head>
<body>
<h1>Once Human Mods Encyclopedia</h1>
<input type="text" id="search" placeholder="Search mods...">
<select id="lang">
  <option value="en">English</option>
  <option value="ru">Русский</option>
</select>
<table id="modTable">
  <thead>
    <tr>
      <th>Name</th><th>Category</th><th>Tier</th><th>Effect</th><th>Containers</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
<script src="script.js"></script>
</body>
</html>
