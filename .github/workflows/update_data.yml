name: Update Once Human Mods Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false   # важная строка, чтобы использовать свой токен
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python update_data.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git commit -m "Automated update of data.json" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Vitaliy26rus/once-human-mods.git HEAD:main
