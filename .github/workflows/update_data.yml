name: Update Once Human Mods Data

on:
  schedule:
    - cron: '0 3 * * *'  # ежедневно в 03:00 UTC
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      # Клонируем репозиторий
      - uses: actions/checkout@v3

      # Устанавливаем Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # Устанавливаем зависимости
      - run: pip install requests beautifulsoup4

      # Запускаем парсер
      - run: python update_data.py

      # Настраиваем SSH агент (работает)
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Коммитим и пушим в ветку data-update
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B data-update
          git add data.json
          git diff --cached --quiet || git commit -m "Automated update of data.json"
          git push git@github.com:Vitaliy26rus/once-human-mods.git data-update --force