name: Update Once Human Mods Data

on:
  schedule:
    - cron: '0 3 * * *'  # ежедневно
  workflow_dispatch:

jobs:
  update-json:
    runs-on: windows-latest  # или ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий без встроенного GITHUB_TOKEN
      - uses: actions/checkout@v3
        with:
          persist-credentials: false  # ⚠️ важно, чтобы не использовался github-actions[bot]

      # 2️⃣ Устанавливаем Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Устанавливаем зависимости
      - run: pip install requests beautifulsoup4

      # 4️⃣ Обновляем JSON
      - run: python update_data.py

      # 5️⃣ Коммитим и пушим через PAT
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B data-update
          git add data.json
          git diff --cached --quiet || git commit -m "Automated update of data.json"
          git push https://$PAT_TOKEN@github.com/Vitaliy26rus/once-human-mods.git data-update --force
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}