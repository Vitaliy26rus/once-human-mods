name: Update Once Human Mods Data

on:
  schedule:
    - cron: '0 3 * * *'  # ежедневно
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - uses: actions/checkout@v3

      # 2️⃣ Устанавливаем Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Устанавливаем зависимости
      - run: pip install requests beautifulsoup4

      # 4️⃣ Запускаем скрипт для обновления data.json
      - run: python update_data.py

      # 5️⃣ Настраиваем SSH агент (последняя рабочая версия)
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6️⃣ Коммитим и пушим изменения в ветку data-update
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B data-update
          git add data.json
          git diff --cached --quiet || git commit -m "Automated update of data.json"
          git push git@github.com:Vitaliy26rus/once-human-mods.git data-update --force