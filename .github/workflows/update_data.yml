name: Update Once Human Mods Data

on:
  schedule:
    - cron: '0 3 * * *'  # ежедневное обновление
  workflow_dispatch:     # запуск вручную

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v3
        with:
          persist-credentials: true  # обязательно true для использования GITHUB_TOKEN

      # 2. Устанавливаем Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Устанавливаем зависимости
      - run: pip install requests beautifulsoup4

      # 4. Запускаем скрипт для обновления data.json
      - run: python update_data.py

      # 5. Коммитим и пушим только если есть изменения
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Automated update of data.json"
          git push